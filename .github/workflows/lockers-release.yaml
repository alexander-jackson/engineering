on:
  push:
    branches: ["master"]
    paths:
    - 'apps/foundation/**'
    - 'apps/lockers/**'
    - '.github/workflows/lockers-release.yaml'

name: lockers Release

env:
  APPLICATION_NAME: lockers

jobs:
  setup:
    name: Generate Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Generate tag
        id: tag
        run: echo "value=$(date '+%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

  docker:
    name: Docker Build (${{ matrix.suffix }})
    needs: setup
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            suffix: amd64
          - runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APPLICATION_NAME }}:${{ needs.setup.outputs.tag }}-${{ matrix.suffix }}
          context: ./apps
          file: ./apps/${{ env.APPLICATION_NAME }}/Dockerfile

  manifest:
    name: Create Manifest
    needs: [setup, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APPLICATION_NAME }}:${{ needs.setup.outputs.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APPLICATION_NAME }}:${{ needs.setup.outputs.tag }}-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.APPLICATION_NAME }}:${{ needs.setup.outputs.tag }}-arm64
      - name: Inform `tag-updater`
        run: |
          curl https://tags.opentracker.app/update -X PUT -H "Content-Type: application/json" -H "Authorization: Bearer ${{ secrets.TAG_UPDATER_PASSPHRASE }}" --data '{"service": "${{ env.APPLICATION_NAME }}", "tag": "${{ needs.setup.outputs.tag }}"}'
