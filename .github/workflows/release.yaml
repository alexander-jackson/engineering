on:
  push:
    branches: ["master"]
    paths:
      - 'apps/**'
      - '.github/workflows/release.yaml'

name: Release

jobs:
  setup:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
      apps: ${{ steps.detect.outputs.apps }}
      build-matrix: ${{ steps.detect.outputs.build-matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        run: echo "value=$(date '+%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Detect changed apps
        id: detect
        run: |
          ALL_APPS='[
            {"name":"certmanager",         "path":"certmanager"},
            {"name":"dns-server",          "path":"dns-server"},
            {"name":"events",              "path":"events"},
            {"name":"lockers",             "path":"lockers"},
            {"name":"opentracker-backend", "path":"opentracker/backend"},
            {"name":"pgmanager",           "path":"pgmanager"},
            {"name":"tag-updater",         "path":"tag-updater"},
            {"name":"today",               "path":"today"},
            {"name":"uptime",              "path":"uptime"}
          ]'

          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"

          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "First push or forced push — rebuilding all apps"
            APPS_JSON=$(echo "$ALL_APPS" | jq -c .)
          else
            CHANGED=$(git diff --name-only "$BEFORE" "$SHA")
            echo "Changed files:"
            echo "$CHANGED"

            if echo "$CHANGED" | grep -q '^apps/foundation/'; then
              echo "Foundation changed — rebuilding all apps"
              APPS_JSON=$(echo "$ALL_APPS" | jq -c .)
            else
              APPS_JSON=$(echo "$ALL_APPS" | jq -c --arg changed "$CHANGED" '
                [.[] | . as $app | select(
                  ($changed | split("\n") | any(startswith("apps/" + $app.path + "/")))
                )]
              ')
              echo "Apps to build: $APPS_JSON"
            fi
          fi

          BUILD_MATRIX=$(echo "$APPS_JSON" | jq -c '
            [.[] | . as $app | ["amd64", "arm64"] | .[] | . as $arch | {
              name: $app.name,
              path: $app.path,
              arch: $arch,
              runner: (if $arch == "amd64" then "ubuntu-latest" else "ubuntu-24.04-arm" end)
            }]
          ')

          echo "apps=$APPS_JSON" >> $GITHUB_OUTPUT
          echo "build-matrix=$BUILD_MATRIX" >> $GITHUB_OUTPUT

  docker:
    name: Docker Build (${{ matrix.name }} / ${{ matrix.arch }})
    needs: setup
    if: needs.setup.outputs.build-matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.build-matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.name }}:${{ needs.setup.outputs.tag }}-${{ matrix.arch }}
          context: ./apps
          file: ./apps/${{ matrix.path }}/Dockerfile

  manifest:
    name: Create Manifest (${{ matrix.name }})
    needs: [setup, docker]
    if: needs.setup.outputs.apps != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.apps) }}
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.name }}:${{ needs.setup.outputs.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.name }}:${{ needs.setup.outputs.tag }}-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.name }}:${{ needs.setup.outputs.tag }}-arm64
      - name: Notify tag-updater
        run: |
          curl https://tags.opentracker.app/update \
            -X PUT \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.TAG_UPDATER_PASSPHRASE }}" \
            --data "{\"service\": \"${{ matrix.name }}\", \"tag\": \"${{ needs.setup.outputs.tag }}\"}"
