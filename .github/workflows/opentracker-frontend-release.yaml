on:
  push:
    branches: ["master"]
    paths:
    - "apps/opentracker/frontend/**"
    - ".github/workflows/opentracker-frontend-release.yaml"

name: opentracker-frontend Release

jobs:
  setup:
    name: Generate Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Generate tag
        id: tag
        run: echo "value=$(date '+%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

  docker:
    name: Docker Build (${{ matrix.arch }})
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/opentracker-frontend:${{ needs.setup.outputs.tag }}-${{ matrix.arch }}
          context: ./apps/opentracker/frontend

  manifest:
    name: Create Manifest
    needs: [setup, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/opentracker-frontend:${{ needs.setup.outputs.tag }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/opentracker-frontend:${{ needs.setup.outputs.tag }}-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/opentracker-frontend:${{ needs.setup.outputs.tag }}-arm64
      - name: Inform `tag-updater`
        run: |
          curl https://tags.opentracker.app/update \
            -X PUT \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.TAG_UPDATER_PASSPHRASE }}" \
            --data "{\"service\": \"opentracker-frontend\", \"tag\": \"${{ needs.setup.outputs.tag }}\"}"
