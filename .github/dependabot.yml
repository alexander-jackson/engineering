version: 2

updates:
  # Cargo workspace — directory points to where the workspace Cargo.toml lives
  - package-ecosystem: "cargo"
    directory: "/apps"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      all-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "cargo"

  # GitHub Actions — always "/" regardless of where workflows live
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    groups:
      all-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
