server:
  host: 127.0.0.1
  port: 8853

upstream:
  resolver: cloudflare-dns.com
  port: 443
  protocol: https
  timeout_seconds: 5

blocklist:
  source:
    location: filesystem
    path: ./blocklist.txt
  refresh_interval_seconds: 3600

cache:
  max_entries: 10000
  default_ttl_seconds: 300
  error_ttl_seconds: 60

metrics:
  endpoint: http://localhost:9090/api/v1/otlp/v1/metrics
  interval_seconds: 15
