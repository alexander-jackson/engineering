server:
  protocols:
    tls:
      host: 0.0.0.0
      port: 853
      cert:
        location: s3
        bucket: configuration
        key: cert.pem
      key:
        location: s3
        bucket: configuration
        key: key.pem
      refresh_interval_seconds: 86400

upstream:
  resolver: all.dns.mullvad.net
  port: 443
  protocol: https
  timeout_seconds: 5

blocklist:
  source:
    location: filesystem
    path: /tmp/blocklist.txt
  refresh_interval_seconds: 3600

cache:
  max_entries: 10000
  default_ttl_seconds: 300
