alb:
  addr: 0.0.0.0
  ports:
    https: 443
  reconciliation: /reconcile
  tls:
    domains:
      opentracker.app:
        cert_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/opentracker.app/fullchain.pem
        key_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/opentracker.app/privkey.pem
      tags.opentracker.app:
        cert_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/tags.opentracker.app/fullchain.pem
        key_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/tags.opentracker.app/privkey.pem
      today.opentracker.app:
        cert_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/today.opentracker.app/fullchain.pem
        key_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/today.opentracker.app/privkey.pem
      uptime.opentracker.app:
        cert_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/uptime.opentracker.app/fullchain.pem
        key_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/uptime.opentracker.app/privkey.pem
      lockers.opentracker.app:
        cert_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/lockers.opentracker.app/fullchain.pem
        key_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/lockers.opentracker.app/privkey.pem
      events.opentracker.app:
        cert_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/events.opentracker.app/fullchain.pem
        key_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/events.opentracker.app/privkey.pem
      certificates.opentracker.app:
        cert_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/certificates.opentracker.app/fullchain.pem
        key_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/certificates.opentracker.app/privkey.pem
      forkup.app:
        cert_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/forkup.app/fullchain.pem
        key_file:
          location: s3
          bucket: configuration-68f6c7
          key: f2/certificates/forkup.app/privkey.pem
  mtls:
    anchor:
      location: s3
      bucket: configuration-68f6c7
      key: f2/anchor.pem
    domains:
      - today.opentracker.app
      - uptime.opentracker.app
      - lockers.opentracker.app
      - events.opentracker.app
      - certificates.opentracker.app

secrets:
  private_key:
    location: s3
    bucket: configuration-68f6c7
    key: f2/private.key

services:
  frontend:
    image: alexanderjackson/opentracker-frontend
    tag: 20260328-1316
    routes:
      - host: opentracker.app
        port: 80
    replicas: 1

  backend:
    image: alexanderjackson/opentracker-backend
    tag: 20260328-1232
    routes:
      - host: opentracker.app
        prefix: /api
        port: 3025
    replicas: 1
    environment:
      DATABASE_HOST: rds.mesh.internal
      DATABASE_NAME: opentracker
      DATABASE_USER: postgres
      DATABASE_PASSWORD: secret:
      JWT_KEY: secret:

  forkup-frontend:
    image: alexanderjackson/forkup-frontend
    tag: 20260404-0624
    routes:
      - host: forkup.app
        port: 80
    replicas: 1
    shutdown_mode: graceful

  forkup-backend:
    image: alexanderjackson/forkup-backend
    tag: 20260313-2152
    routes:
      - host: forkup.app
        prefix: /api
        port: 8083
    replicas: 1
    shutdown_mode: graceful
    volumes:
      config:
        source:
          location: s3
          bucket: configuration-68f6c7
          key: forkup/config.yaml
        target: /app/config/forkup.yaml
    environment:
      RUST_LOG: debug

  tag-updater:
    image: alexanderjackson/tag-updater
    tag: 20260328-0709
    routes:
      - host: tags.opentracker.app
        port: 4025
    replicas: 1
    volumes:
      config:
        source:
          location: s3
          bucket: configuration-68f6c7
          key: tag-updater/config.yaml
        target: /app/config/tag-updater.yaml

  today:
    image: alexanderjackson/today
    tag: 20260328-0709
    routes:
      - host: today.opentracker.app
        port: 8000
    replicas: 1
    volumes:
      config:
        source:
          location: s3
          bucket: configuration-68f6c7
          key: today/config.yaml
        target: /app/config/today.yaml

  lockers:
    image: alexanderjackson/lockers
    tag: 20260328-0709
    routes:
      - host: lockers.opentracker.app
        port: 8000
    replicas: 1
    volumes:
      config:
        source:
          location: s3
          bucket: configuration-68f6c7
          key: lockers/config.yaml
        target: /app/config/lockers.yaml

  pgmanager:
    image: alexanderjackson/pgmanager
    tag: 20260403-1018
    replicas: 1
    environment:
      AWS_ROLE_ARN: arn:aws:iam::558855412466:role/pgmanager-role
    volumes:
      config:
        source:
          location: s3
          bucket: configuration-68f6c7
          key: pgmanager/config.yaml
        target: /app/config/pgmanager.yaml

  uptime:
    image: alexanderjackson/uptime
    tag: 20260328-0709
    routes:
      - host: uptime.opentracker.app
        port: 8000
    replicas: 1
    environment:
      AWS_ROLE_ARN: arn:aws:iam::558855412466:role/uptime-role
    volumes:
      config:
        source:
          location: s3
          bucket: configuration-68f6c7
          key: uptime/config.yaml
        target: /app/config/uptime.yaml

  events:
    image: alexanderjackson/events
    tag: 20260329-0801
    routes:
      - host: events.opentracker.app
        port: 3333
    replicas: 1
    volumes:
      config:
        source:
          location: s3
          bucket: configuration-68f6c7
          key: events/config.yaml
        target: /app/config/events.yaml

  certmanager:
    image: alexanderjackson/certmanager
    tag: 20260328-0709
    routes:
      - host: certificates.opentracker.app
        port: 4444
    replicas: 1
    environment:
      AWS_ROLE_ARN: arn:aws:iam::558855412466:role/certmanager-role
    volumes:
      config:
        source:
          location: s3
          bucket: configuration-68f6c7
          key: certmanager/config.yaml
        target: /app/config/certmanager.yaml
